[project]
name = "minithesis"
version = "0.1.0"
description = "A minimal property-based testing library"
requires-python = ">=3.11"

[dependency-groups]
dev = [
    "hypothesis",
    "pytest",
    "coverage",
    "ruff",
    "pyright",
]

[tool.coverage.report]
exclude_also = [
    "raise NotImplementedError",
]
