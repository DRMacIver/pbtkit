name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Check formatting
        run: |
          uv run ruff format src/ tests/
          uv run ruff check --fix src/ tests/
          git diff --exit-code

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run pyright src/

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Run tests with 100% branch coverage
        run: |
          uv run python -m coverage run --source=src/pbtkit --branch -m pytest tests/ -m 'not hypothesis' --verbose --timeout=300
          uv run coverage report --show-missing --fail-under=100

  test-core:
    needs: [format, typecheck, test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        extension:
          - bytes
          - caching
          - collections
          - database
          - draw_names
          - edge_case_boosting
          - floats
          - shrinking.advanced_bytes_passes
          - shrinking.advanced_integer_passes
          - shrinking.advanced_string_passes
          - shrinking.bind_deletion
          - shrinking.duplication_passes
          - shrinking.index_passes
          - shrinking.mutation
          - shrinking.sorting
          - span_mutation
          - spans
          - targeting
          - text
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: "Test with ${{ matrix.extension }} disabled"
        run: PBTKIT_DISABLED=${{ matrix.extension }} uv run pytest tests/ -m 'not hypothesis' --verbose --timeout=300

  compiled-full:
    needs: [format, typecheck, test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run python tools/compile_pbtkit.py
      - run: uv run pyright build/pkg/pbtkit/core.py
      - name: Test compiled (full)
        run: |
          uv run python -m coverage run --source=build/pkg/pbtkit --branch -m pytest tests/ -m 'not hypothesis' --override-ini='pythonpath=build/pkg' -q --timeout=300
          uv run coverage report --show-missing --include='build/pkg/pbtkit/core.py' --fail-under=100

  compiled-minimal:
    needs: [format, typecheck, test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run python tools/compile_pbtkit.py --minimal
      - run: uv run pyright build/pkg/pbtkit/core.py
      - name: Test compiled (minimal)
        run: |
          disabled=$(uv run python -c "from tools.compile_pbtkit import EXTENSIONS; print(','.join(EXTENSIONS))")
          PBTKIT_DISABLED=$disabled uv run python -m coverage run --source=build/pkg/pbtkit --branch -m pytest tests/ -m 'not hypothesis' --override-ini='pythonpath=build/pkg' -q --timeout=300
          uv run coverage report --show-missing --include='build/pkg/pbtkit/core.py' --fail-under=100

  compiled-one-enabled:
    needs: [format, typecheck, test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        extension:
          - bytes
          - caching
          - collections
          - database
          - draw_names
          - edge_case_boosting
          - floats
          - shrinking.advanced_bytes_passes
          - shrinking.advanced_integer_passes
          - shrinking.advanced_string_passes
          - shrinking.bind_deletion
          - shrinking.duplication_passes
          - shrinking.index_passes
          - shrinking.mutation
          - shrinking.sorting
          - span_mutation
          - spans
          - targeting
          - text
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: "Compile with only ${{ matrix.extension }}"
        run: uv run python tools/compile_pbtkit.py --features=${{ matrix.extension }}
      - run: uv run pyright build/pkg/pbtkit/core.py
      - name: "Test compiled (feature=${{ matrix.extension }})"
        run: |
          disabled=$(uv run python -c "
          from tools.compile_pbtkit import EXTENSIONS, expand_disabled
          print(','.join(sorted(expand_disabled(frozenset(set(EXTENSIONS) - {'${{ matrix.extension }}'})))))
          ")
          PBTKIT_DISABLED=$disabled uv run python -m coverage run --source=build/pkg/pbtkit --branch -m pytest tests/ -m 'not hypothesis' --override-ini='pythonpath=build/pkg' -q --timeout=300
          uv run coverage report --show-missing --include='build/pkg/pbtkit/core.py' --fail-under=100

  compiled-one-disabled:
    needs: [format, typecheck, test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        extension:
          - bytes
          - caching
          - collections
          - database
          - draw_names
          - edge_case_boosting
          - floats
          - shrinking.advanced_bytes_passes
          - shrinking.advanced_integer_passes
          - shrinking.advanced_string_passes
          - shrinking.bind_deletion
          - shrinking.duplication_passes
          - shrinking.index_passes
          - shrinking.mutation
          - shrinking.sorting
          - span_mutation
          - spans
          - targeting
          - text
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: "Compile without ${{ matrix.extension }}"
        run: uv run python tools/compile_pbtkit.py --disable=${{ matrix.extension }}
      - run: uv run pyright build/pkg/pbtkit/core.py
      - name: "Test compiled (disable=${{ matrix.extension }})"
        run: |
          disabled=$(uv run python -c "
          from tools.compile_pbtkit import expand_disabled
          print(','.join(sorted(expand_disabled(frozenset(['${{ matrix.extension }}'])))))
          ")
          PBTKIT_DISABLED=$disabled uv run python -m coverage run --source=build/pkg/pbtkit --branch -m pytest tests/ -m 'not hypothesis' --override-ini='pythonpath=build/pkg' -q --timeout=300
          uv run coverage report --show-missing --include='build/pkg/pbtkit/core.py' --fail-under=100

  hypothesis:
    needs: [format, typecheck, test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Run Hypothesis pbtsmith tests
        env:
          HYPOTHESIS_PROFILE: ci
        run: uv run pytest tests/test_pbtsmith.py tests/test_shrink_comparison.py tests/test_findability_comparison.py -m hypothesis -v -o 'addopts=' --timeout=300

  test-macos:
    needs: [format, typecheck, test]
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Test (uncompiled)
        run: uv run pytest tests/ -m 'not hypothesis' -q --timeout=300
      - name: Test (compiled)
        run: |
          uv run python tools/compile_pbtkit.py
          uv run pytest tests/ -m 'not hypothesis' --override-ini='pythonpath=build/pkg' -q --timeout=300

  test-windows:
    needs: [format, typecheck, test]
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Test (uncompiled)
        run: uv run pytest tests/ -m 'not hypothesis' -q --timeout=300
      - name: Test (compiled)
        run: |
          uv run python tools/compile_pbtkit.py
          uv run pytest tests/ -m 'not hypothesis' --override-ini='pythonpath=build/pkg' -q --timeout=300
